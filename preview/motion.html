<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Motion</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Motion &nbsp;·&nbsp; 3 durations, ease only, no bounce</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; font-size:12px;">
    <div style="background:#1a1f28; border:1px solid #2a3342; border-left:2px solid #00f0a0; border-radius:0 4px 4px 0; padding:10px 12px;">
      <div style="color:#00f0a0; font-weight:600; font-size:13px;">140 ms</div>
      <div class="muted" style="font-size:10.5px; margin-top:2px;">--t-fast</div>
      <div style="color:#a0a6ae; margin-top:4px;">link hover, nav hover</div>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-left:2px solid #00f0a0; border-radius:0 4px 4px 0; padding:10px 12px;">
      <div style="color:#00f0a0; font-weight:600; font-size:13px;">160 ms</div>
      <div class="muted" style="font-size:10.5px; margin-top:2px;">--t-mid</div>
      <div style="color:#a0a6ae; margin-top:4px;">list translate, border</div>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-left:2px solid #00f0a0; border-radius:0 4px 4px 0; padding:10px 12px;">
      <div style="color:#00f0a0; font-weight:600; font-size:13px;">240 ms</div>
      <div class="muted" style="font-size:10.5px; margin-top:2px;">--t-slow</div>
      <div style="color:#a0a6ae; margin-top:4px;">theme, surface</div>
    </div>
  </div>
  <div style="margin-top:12px; background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px; font-size:11.5px; color:#a0a6ae; display:flex; align-items:center; gap:10px;">
    <span>cursor blink · 1.1 s steps(2) infinite</span>
    <span id="cursor" style="display:inline-block; width:9px; height:16px; background:#00f0a0; vertical-align:text-bottom; animation:lh-blink 1.1s steps(2) infinite;"></span>
  </div>
  <style>@keyframes lh-blink { 0%,50%{opacity:1} 50.01%,100%{opacity:0} }</style>
</div>
</body>
</html>
