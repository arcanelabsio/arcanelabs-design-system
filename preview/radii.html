<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Corner radii &nbsp;·&nbsp; 4 tiers + left-flat variant</div>
  <div class="row">
    <div class="swatch" style="align-items:center; gap:10px;">
      <div style="width:80px; height:60px; background:#1a1f28; border:1px solid #2a3342; border-radius:10px;"></div>
      <div>
        <div class="swatch__name">10 px</div>
        <div class="swatch__hex">window</div>
      </div>
    </div>
    <div class="swatch" style="align-items:center; gap:10px;">
      <div style="width:80px; height:60px; background:#1a1f28; border:1px solid #2a3342; border-radius:6px;"></div>
      <div>
        <div class="swatch__name">6 px</div>
        <div class="swatch__hex">card</div>
      </div>
    </div>
    <div class="swatch" style="align-items:center; gap:10px;">
      <div style="width:80px; height:60px; background:#1a1f28; border:1px solid #2a3342; border-radius:4px;"></div>
      <div>
        <div class="swatch__name">4 px</div>
        <div class="swatch__hex">row</div>
      </div>
    </div>
    <div class="swatch" style="align-items:center; gap:10px;">
      <div style="width:80px; height:60px; background:#1a1f28; border:1px solid #2a3342; border-left:3px solid #00f0a0; border-radius:0 4px 4px 0;"></div>
      <div>
        <div class="swatch__name">0 4 4 0</div>
        <div class="swatch__hex">left-accent row</div>
      </div>
    </div>
    <div class="swatch" style="align-items:center; gap:10px;">
      <div style="width:40px; height:40px; background:#ff5f56; border-radius:50%;"></div>
      <div>
        <div class="swatch__name">50%</div>
        <div class="swatch__hex">traffic light only</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
