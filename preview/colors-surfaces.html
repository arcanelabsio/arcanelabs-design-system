<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Surfaces</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Surface stack &nbsp;·&nbsp; page → window → cards</div>
  <div class="row">
    <div class="swatch">
      <div class="swatch__chip" style="background:#080b10"></div>
      <div>
        <div class="swatch__name">--bg</div>
        <div class="swatch__hex">#080b10</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#0d1117"></div>
      <div>
        <div class="swatch__name">--bg-2</div>
        <div class="swatch__hex">#0d1117</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#1a1f28"></div>
      <div>
        <div class="swatch__name">--subtle</div>
        <div class="swatch__hex">#1a1f28</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#2a3342"></div>
      <div>
        <div class="swatch__name">--border</div>
        <div class="swatch__hex">#2a3342</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
