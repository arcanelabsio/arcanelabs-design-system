<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Spacing scale &nbsp;·&nbsp; fluid clamps, no fixed grid</div>
  <div style="display:grid; gap:8px; font-size:12px;">
    <div style="display:grid; grid-template-columns:170px 1fr auto; gap:10px; align-items:center;">
      <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">--page-pad</code>
      <div style="background:#00f0a0; height:10px; width:min(100%, 56px);"></div>
      <span class="muted">24–56 px</span>
    </div>
    <div style="display:grid; grid-template-columns:170px 1fr auto; gap:10px; align-items:center;">
      <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">--section-gap</code>
      <div style="background:#00f0a0; height:10px; width:min(100%, 48px);"></div>
      <span class="muted">28–48 px</span>
    </div>
    <div style="display:grid; grid-template-columns:170px 1fr auto; gap:10px; align-items:center;">
      <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">--sep-gap</code>
      <div style="background:#00f0a0; height:10px; width:min(100%, 72px);"></div>
      <span class="muted">40–72 px</span>
    </div>
    <div style="display:grid; grid-template-columns:170px 1fr auto; gap:10px; align-items:center;">
      <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">--rule-gap</code>
      <div style="background:#ffb347; height:10px; width:min(100%, 44px);"></div>
      <span class="muted">28–44 px</span>
    </div>
    <div style="display:grid; grid-template-columns:170px 1fr auto; gap:10px; align-items:center;">
      <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">list gap</code>
      <div style="background:#707683; height:8px; width:14px;"></div>
      <span class="muted">14 px</span>
    </div>
  </div>
</div>
</body>
</html>
