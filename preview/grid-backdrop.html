<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Grid background</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Page backdrop &nbsp;·&nbsp; faint mint grid, 40 × 40 px, 1.5 % alpha</div>
  <div style="background:#080b10; background-image:linear-gradient(rgba(0,240,160,0.06) 0.5px, transparent 0.5px), linear-gradient(90deg, rgba(0,240,160,0.06) 0.5px, transparent 0.5px); background-size:40px 40px; border:1px solid #2a3342; border-radius:6px; height:200px; position:relative;">
    <div style="position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:#707683; font-size:11px;">
      grid alpha boosted 4× for preview — live site uses 1.5 %
    </div>
  </div>
  <div style="margin-top:10px; font-size:11px; color:#707683;">
    Feel the grid before you see it. No other backgrounds — no imagery, no illustration, no gradient fills.
  </div>
</div>
</body>
</html>
