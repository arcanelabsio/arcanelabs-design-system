<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Accents</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Accent palette &nbsp;·&nbsp; mint = primary &nbsp; amber = secondary</div>
  <div class="row">
    <div class="swatch">
      <div class="swatch__chip" style="background:#00f0a0"></div>
      <div>
        <div class="swatch__name" style="color:#00f0a0">--mint</div>
        <div class="swatch__hex">#00f0a0 · links</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#6feecf"></div>
      <div>
        <div class="swatch__name" style="color:#6feecf">--mint-soft</div>
        <div class="swatch__hex">#6feecf · hover</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#ffb347"></div>
      <div>
        <div class="swatch__name" style="color:#ffb347">--amber</div>
        <div class="swatch__hex">#ffb347 · rule, bold</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#ffd280"></div>
      <div>
        <div class="swatch__name" style="color:#ffd280">--amber-soft</div>
        <div class="swatch__hex">#ffd280</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#ff6b6b"></div>
      <div>
        <div class="swatch__name" style="color:#ff6b6b">--red</div>
        <div class="swatch__hex">#ff6b6b · error</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#7ab8ff"></div>
      <div>
        <div class="swatch__name" style="color:#7ab8ff">--blue</div>
        <div class="swatch__hex">#7ab8ff · numbers</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
