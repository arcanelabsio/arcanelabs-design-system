<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Prefix glyphs</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Prefix glyphs &nbsp;·&nbsp; the vocabulary of the system</div>
  <div style="display:grid; grid-template-columns:repeat(2, 1fr); gap:10px; font-size:13px; line-height:1.6;">
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px;">
      <span style="color:#ffb347; opacity:0.7; font-weight:700">#</span> <span style="color:#e5e7eb; font-weight:700">hero / name</span><br>
      <span class="muted" style="font-size:11px">amber hash, 70% opacity</span>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px;">
      <span style="color:#ffb347; opacity:0.6; font-weight:700">##</span> <span style="color:#e5e7eb; font-weight:700">prose h2</span><br>
      <span class="muted" style="font-size:11px">markdown cue preserved</span>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-left:3px solid #00f0a0; border-radius:0 4px 4px 0; padding:10px 12px;">
      <span style="color:#00f0a0">&gt;</span> <span style="color:#a0a6ae">greeting</span><br>
      <span class="muted" style="font-size:11px">blockquote-like lead line</span>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px;">
      <span style="color:#00f0a0; font-weight:600">ajit@arcanelabs</span> <span style="color:#e5e7eb">$ ls</span><br>
      <span class="muted" style="font-size:11px">prompt prefix</span>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px;">
      <span style="color:#707683">//</span> <span style="color:#707683">2026-04-19</span><br>
      <span class="muted" style="font-size:11px">meta / comment</span>
    </div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:4px; padding:10px 12px;">
      <span style="color:#00f0a0">▸</span> <span style="color:#e5e7eb">bullet item</span> &nbsp; <span style="color:#00f0a0; font-weight:600">[1]</span> ordered<br>
      <span class="muted" style="font-size:11px">list markers</span>
    </div>
  </div>
</div>
</body>
</html>
