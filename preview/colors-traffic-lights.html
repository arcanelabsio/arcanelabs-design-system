<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Traffic lights</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Traffic lights &nbsp;·&nbsp; terminal chrome only</div>
  <div style="background:#1a1f28; border:1px solid #2a3342; border-bottom:1px solid #2a3342; border-radius:6px; padding:14px 18px; display:flex; align-items:center; gap:10px;">
    <span style="width:14px; height:14px; border-radius:50%; background:#ff5f56;"></span>
    <span style="width:14px; height:14px; border-radius:50%; background:#ffbd2e;"></span>
    <span style="width:14px; height:14px; border-radius:50%; background:#27c93f;"></span>
    <span style="flex:1; text-align:center; font-size:11px; letter-spacing:0.08em; color:#707683;"><strong style="color:#a0a6ae; font-weight:500;">arcanelabsio</strong> — zsh — home</span>
  </div>
  <div class="row" style="margin-top:14px;">
    <div class="swatch">
      <div class="swatch__chip" style="background:#ff5f56; border-radius:50%; width:44px; height:44px; align-self:center;"></div>
      <div>
        <div class="swatch__name">--tl-red</div>
        <div class="swatch__hex">#ff5f56</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#ffbd2e; border-radius:50%; width:44px; height:44px; align-self:center;"></div>
      <div>
        <div class="swatch__name">--tl-amber</div>
        <div class="swatch__hex">#ffbd2e</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#27c93f; border-radius:50%; width:44px; height:44px; align-self:center;"></div>
      <div>
        <div class="swatch__name">--tl-green</div>
        <div class="swatch__hex">#27c93f</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
