<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Text</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Text stack &nbsp;·&nbsp; high → low contrast</div>
  <div class="row">
    <div class="swatch">
      <div class="swatch__chip" style="background:#e5e7eb"></div>
      <div>
        <div class="swatch__name">--fg</div>
        <div class="swatch__hex">#e5e7eb</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#a0a6ae"></div>
      <div>
        <div class="swatch__name">--fg-mute</div>
        <div class="swatch__hex">#a0a6ae</div>
      </div>
    </div>
    <div class="swatch">
      <div class="swatch__chip" style="background:#707683"></div>
      <div>
        <div class="swatch__name">--muted</div>
        <div class="swatch__hex">#707683</div>
      </div>
    </div>
  </div>
  <div style="margin-top:14px; background:#0d1117; border:1px solid #2a3342; border-radius:4px; padding:12px 14px; font-size:12.5px;">
    <div style="color:#e5e7eb">Body text — <span style="color:#e5e7eb">fg</span> for primary prose.</div>
    <div style="color:#a0a6ae">Secondary — <span style="color:#a0a6ae">fg-mute</span> for nav, captions.</div>
    <div style="color:#707683">Tertiary — <span style="color:#707683">muted</span> for timestamps, dots.</div>
  </div>
</div>
</body>
</html>
