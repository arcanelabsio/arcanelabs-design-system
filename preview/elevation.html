<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Elevation</title>
<link rel="stylesheet" href="card.css">
</head>
<body>
<div class="card">
  <div class="label">Elevation &nbsp;·&nbsp; window shadow is the only shadow</div>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; padding:20px 10px 30px;">
    <div style="background:#0d1117; border:1px solid #2a3342; border-radius:10px; height:90px; box-shadow:0 20px 60px -20px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,240,160,0.03); display:flex; align-items:center; justify-content:center; font-size:11px; color:#a0a6ae;">window<br>elevation</div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-radius:6px; height:90px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#a0a6ae;">card<br>flat + 1 px border</div>
    <div style="background:#1a1f28; border:1px solid #2a3342; border-left:2px solid #00f0a0; border-radius:0 4px 4px 0; height:90px; display:flex; align-items:center; justify-content:center; font-size:11px; color:#a0a6ae; text-align:center;">row<br>2 px mint left</div>
  </div>
  <div style="font-size:11px; color:#707683; line-height:1.6;">
    <code style="color:#ffb347; background:#1a1f28; border:1px solid #2a3342; border-radius:3px; padding:2px 6px; font-size:10.5px;">box-shadow: 0 20px 60px -20px rgba(0,0,0,.5), 0 0 0 1px rgba(0,240,160,.03);</code>
  </div>
</div>
</body>
</html>
